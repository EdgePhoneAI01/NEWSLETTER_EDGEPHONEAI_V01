# Regenerates index.html daily and commits it (e.g. for GitHub Pages).
# Add repository secret NEWS_API_KEY if you use NewsAPI.org.

name: Daily EdgePhone newsletter

on:
  schedule:
    # 06:15 UTC daily — adjust cron to your timezone/preferences
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate newsletter
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python generate_newsletter.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh daily newsletter $(date -u +%Y-%m-%d)"
            git push
          fi
