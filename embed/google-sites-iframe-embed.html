<!--
  GOOGLE SITES — Embed your hosted newsletter (recommended)

  1. Publish index.html (e.g. GitHub Pages, Netlify, Cloudflare Pages) so it has a public HTTPS URL.
  2. In Google Sites: Insert → Embed → Embed code (or the “</>” embed option).
  3. Paste ONLY the <iframe> block below (replace YOUR_PUBLIC_URL). Remove this comment if the editor rejects it.
  4. Adjust height (px) until the full page scrolls comfortably inside the embed.

  Example URL: https://yourname.github.io/edgephone-daily-newsletter/
-->
<iframe
  src="https://YOUR_PUBLIC_URL/index.html"
  title="EdgePhone Daily — Edge AI headlines"
  width="100%"
  height="2400"
  style="border:0;display:block;max-width:1100px;margin:0 auto;min-height:600px;"
  loading="lazy"
  referrerpolicy="no-referrer-when-downgrade"
></iframe>
